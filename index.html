<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vibe Translator 💀</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      justify-content: center;
      padding: 40px;
    }
    .container {
      max-width: 600px;
      width: 100%;
    }
    textarea {
      width: 100%;
      height: 120px;
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 8px;
      border: none;
    }
    button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-right: 10px;
    }
    .output {
      margin-top: 20px;
      background: #222;
      padding: 15px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Vibe Translator 💀</h1>

    <textarea id="input" placeholder="Type something..."></textarea>

    <div>
      <button onclick="toChaos()">Normal → Chaos</button>
<button onclick="toAdult()">Chaos → Adult</button>
    </div>

    <div class="output" id="output">Your translation will appear here...</div>
  </div>

 <script>
  function randomChoice(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  window.toChaos = function () {
    let text = document.getElementById("input").value;

    let replacements = {
      "you": ["u", "bestie"],
      "are": ["r"],
      "please": ["plz"],
      "really": ["fr", "lowkey"],
      "going to": ["gonna"]
    };

    text = text.toLowerCase();

    for (let key in replacements) {
      let regex = new RegExp("\\b" + key + "\\b", "g");
      text = text.replace(regex, randomChoice(replacements[key]));
    }

    let endings = [" 😭", " 💀", " fr", " no cap", " 😩"];
    text += randomChoice(endings);

    document.getElementById("output").innerText = text;
  };

  window.toAdult = function () {
    let text = document.getElementById("input").value;

    let cleanup = {
      "u": "you",
      "r": "are",
      "fr": "really",
      "nah": "no",
      "lol": ""
    };

    text = text.toLowerCase();

    for (let key in cleanup) {
      let regex = new RegExp(key, "g");
      text = text.replace(regex, cleanup[key]);
    }

    document.getElementById("output").innerText = text;
  };
</script>
</body>
</html>
