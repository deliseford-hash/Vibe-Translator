<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vibe Translator 💀</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      justify-content: center;
      padding: 40px;
    }
    .container {
      max-width: 600px;
      width: 100%;
    }
    textarea {
      width: 100%;
      height: 120px;
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 8px;
      border: none;
    }
    button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-right: 10px;
    }
    .output {
      margin-top: 20px;
      background: #222;
      padding: 15px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Vibe Translator 💀</h1>

    <textarea id="input" placeholder="Type something..."></textarea>

    <div>
      <button onclick="toChaos()">Normal → Chaos</button>
<button onclick="toAdult()">Chaos → Adult</button>
    </div>

    <div class="output" id="output">Your translation will appear here...</div>
  </div>

 <script>
function randomChoice(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

// More aggressive chaos generator
window.toChaos = function () {
  let text = document.getElementById("input").value.toLowerCase();

  // Phrase-level replacements first (this is key)
  const phrases = [
    { from: /i am/g, to: ["i'm", "im"] },
    { from: /i do not/g, to: ["i don't"] },
    { from: /going to/g, to: ["gonna"] },
    { from: /want to/g, to: ["wanna"] },
    { from: /let me/g, to: ["lemme"] },
    { from: /kind of/g, to: ["kinda"] },
    { from: /do you/g, to: ["u"] },
    { from: /are you/g, to: ["u"] }
  ];

  phrases.forEach(p => {
    text = text.replace(p.from, randomChoice(p.to));
  });

  // Word replacements
  const words = {
    "you": ["u", "bestie"],
    "are": ["r"],
    "please": ["plz"],
    "really": ["fr", "lowkey"],
    "hello": ["hey", "yo"],
    "hi": ["hey"],
    "no": ["nah", "nooo"],
    "yes": ["yesss", "ya"],
    "my": ["myyy"],
    "friend": ["bestie"],
    "okay": ["ok", "okayy"]
  };

  for (let key in words) {
    let regex = new RegExp("\\b" + key + "\\b", "g");
    text = text.replace(regex, randomChoice(words[key]));
  }

  // Random chaos injections
  const chaosBits = [
    " not me",
    " i can't",
    " why is this me",
    " pls",
    " send help"
  ];

  if (Math.random() > 0.5) {
    text += randomChoice(chaosBits);
  }

  // Ending spam
  const endings = [
    " 😭",
    " 💀",
    " 😩",
    " ✨",
    " fr",
    " no cap"
  ];

  text += randomChoice(endings);

  document.getElementById("output").innerText = text;
};

// MUCH smarter cleanup
window.toAdult = function () {
  let text = document.getElementById("input").value;

  const cleanup = [
    { from: /\bu\b/g, to: "you" },
    { from: /\br\b/g, to: "are" },
    { from: /\bfr\b/g, to: "really" },
    { from: /\bnah\b/g, to: "no" },
    { from: /\bya\b/g, to: "yes" },
    { from: /\bgonna\b/g, to: "going to" },
    { from: /\bwanna\b/g, to: "want to" },
    { from: /\blemme\b/g, to: "let me" },
    { from: /\blowkey\b/g, to: "somewhat" },
    { from: /\bbestie\b/g, to: "" }
  ];

  cleanup.forEach(c => {
    text = text.replace(c.from, c.to);
  });

  // Remove emojis & chaos phrases
  text = text.replace(/[😭💀😩✨]/g, "");
  text = text.replace(/no cap|i can't|send help|not me/gi, "");

  // Clean spacing
  text = text.replace(/\s+/g, " ").trim();

  document.getElementById("output").innerText = text;
};
</script>
</body>
</html>
