<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vibe Translator 💀</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      justify-content: center;
      padding: 40px;
    }
    .container {
      max-width: 600px;
      width: 100%;
    }
    textarea {
      width: 100%;
      height: 120px;
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 8px;
      border: none;
    }
    button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-right: 10px;
    }
    .output {
      margin-top: 20px;
      background: #222;
      padding: 15px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Vibe Translator 💀</h1>

    <textarea id="input" placeholder="Type something..."></textarea>

    <div>
      <button onclick="translate('chaos')">Normal → Chaos</button>
      <button onclick="translate('adult')">Chaos → Adult</button>
    </div>

    <div class="output" id="output">Your translation will appear here...</div>
  </div>

  <script>
    async function translate(mode) {
      const text = document.getElementById("input").value;
      const output = document.getElementById("output");

      output.innerText = "Translating...";

      let prompt = "";

      if (mode === "chaos") {
        prompt = `Rewrite this in over-the-top Gen Z texting slang with emojis and dramatic tone:\n\n${text}`;
      } else {
        prompt = `Translate this slang-heavy message into clear adult English:\n\n${text}`;
      }

      try {
        const response = await fetch("https://api.openai.com/v1/responses", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer YOUR_API_KEY_HERE"
          },
          body: JSON.stringify({
            model: "gpt-4.1-mini",
            input: prompt
          })
        });

        const data = await response.json();
        output.innerText = data.output[0].content[0].text;
      } catch (err) {
        output.innerText = "Error: " + err.message;
      }
    }
  </script>
</body>
</html>
